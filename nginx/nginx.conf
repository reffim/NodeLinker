# ============================================================
# NodeLinker – Nginx reverse-proxy + SPA server
# ============================================================

# Rate-limit zones (defined at http context level)
# api_limit: protects all /api/* endpoints
# auth_limit: tighter limit for auth endpoints (login, register)
limit_req_zone $binary_remote_addr zone=api_limit:10m   rate=60r/m;
limit_req_zone $binary_remote_addr zone=auth_limit:10m  rate=10r/m;

server {
    listen 80;
    server_name _;

    # ----------------------------------------------------------
    # Security headers
    # ----------------------------------------------------------
    add_header X-Frame-Options           "SAMEORIGIN"              always;
    add_header X-Content-Type-Options    "nosniff"                 always;
    add_header X-XSS-Protection          "1; mode=block"           always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' ws: wss:;"
        always;

    # ----------------------------------------------------------
    # Auth endpoints – tighter rate limit
    # ----------------------------------------------------------
    location ~ ^/api/v1/auth/(login|register) {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ----------------------------------------------------------
    # API reverse proxy
    # ----------------------------------------------------------
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts suitable for long-running API calls
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_connect_timeout 10s;
    }

    # ----------------------------------------------------------
    # WebSocket proxy (job log + node status streams)
    # ----------------------------------------------------------
    location /ws/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 3600s;
    }

    # ----------------------------------------------------------
    # Static SPA – serve built React app, fall back to index.html
    # ----------------------------------------------------------
    location / {
        root  /usr/share/nginx/html;
        index index.html;

        # Cache hashed assets aggressively
        location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        try_files $uri $uri/ /index.html;
    }

    # Hide Nginx version
    server_tokens off;

    # Limit request body size (10 MB; playbook uploads can be large)
    client_max_body_size 10m;
}
